<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"><meta name="description" content="SETRANE EXPRESS - Cadastro mestre institucional"><meta name="author" content="PyDen Technologies"><link rel="icon" href="../../assets/favicon.ico"><title>SETRANE EXPRESS – Parâmetros Gerais</title>
    <link rel="stylesheet" href="../../css/simplebar.css"><link href="https://fonts.googleapis.com/css2?family=Overpass:wght@100;200;300;400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../css/feather.css"><link rel="stylesheet" href="../../css/institucional-module.css"><link rel="stylesheet" href="../../css/app-light.css" id="lightTheme" disabled><link rel="stylesheet" href="../../css/app-dark.css" id="darkTheme">
</head>
<body class="vertical dark" data-institucional-page="parametros">
    <div class="wrapper">
        <nav class="topnav navbar navbar-light">
            <button type="button" class="navbar-toggler text-muted mt-2 p-0 mr-3 collapseSidebar"><i class="fe fe-menu navbar-toggler-icon"></i></button>
            <form class="form-inline mr-auto searchform text-muted"><input class="form-control mr-sm-2 bg-transparent border-0 pl-4 text-muted" type="search" placeholder="Buscar..." aria-label="Search"></form>
            <ul class="nav">
                <li class="nav-item"><a class="nav-link text-muted my-2" href="#" id="modeSwitcher" data-mode="dark"><i class="fe fe-sun fe-16"></i></a></li>
                <li class="nav-item dropdown"><a class="nav-link dropdown-toggle text-muted pr-0" href="#" id="navbarDropdownMenuLink" role="button" data-toggle="dropdown"><span class="avatar avatar-sm mt-2"><img src="../../assets/icons/user.png" alt="Usuário" class="avatar-img rounded-circle"></span></a><div class="dropdown-menu dropdown-menu-right" aria-labelledby="navbarDropdownMenuLink"><a class="dropdown-item" href="/sistema/configuracoes">Configurações</a><div class="dropdown-divider"></div><a class="dropdown-item text-danger" href="/auth-logout.html">Sair</a></div></li>
            </ul>
        </nav>
        <aside class="sidebar-left border-right bg-white shadow" id="leftSidebar" data-simplebar><a href="#" class="btn collapseSidebar toggle-btn d-lg-none text-muted ml-2 mt-3"><i class="fe fe-x"></i></a><nav class="vertnav navbar navbar-light"><div class="w-100 mb-4 d-flex"><a class="navbar-brand mx-auto mt-2 flex-fill text-center" href="/dashboard"><span class="h5 mb-0 text-uppercase font-weight-bold">SETRANE EXPRESS</span></a></div></nav></aside>
        <main role="main" class="main-content">
            <div class="container-fluid">
                <div class="institutional-hero">
                    <h2 class="mb-1" data-role="page-title">Parâmetros Gerais</h2>
                    <p class="text-muted mb-0" data-role="page-description"></p>
                </div>
                <div class="row" data-role="stats"></div>

                <div class="institutional-section-card">
                    <div class="institutional-form-section-title">Identidade da rede</div>
                    <div class="row">
                        <div class="col-md-4"><div class="form-group"><label>Nome da rede</label><input class="form-control" data-parameter-name="nome_rede" type="text"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Secretaria responsável</label><input class="form-control" data-parameter-name="secretaria_nome" type="text"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Município / UF</label><input class="form-control" data-parameter-name="municipio_uf" type="text"></div></div>
                        <div class="col-md-3"><div class="form-group"><label>Ano letivo padrão</label><input class="form-control" data-parameter-name="ano_letivo_padrao" type="number"></div></div>
                        <div class="col-md-3 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-logomarca" data-parameter-name="emite_documentos_com_logomarca" type="checkbox"><label class="custom-control-label" for="param-logomarca">Emitir documentos com logomarca</label></div></div>
                    </div>
                    <div class="section-actions"><button class="btn btn-primary" data-save-section>Salvar identidade da rede</button></div>
                </div>

                <div class="institutional-section-card">
                    <div class="institutional-form-section-title">Regras acadêmicas</div>
                    <div class="row">
                        <div class="col-md-3"><div class="form-group"><label>Frequência mínima (%)</label><input class="form-control" data-parameter-name="frequencia_minima" type="number" step="0.01"></div></div>
                        <div class="col-md-3"><div class="form-group"><label>Nota mínima</label><input class="form-control" data-parameter-name="nota_minima" type="number" step="0.01"></div></div>
                        <div class="col-md-3"><div class="form-group"><label>Dias letivos mínimos</label><input class="form-control" data-parameter-name="dias_letivos_minimos" type="number"></div></div>
                        <div class="col-md-3"><div class="form-group"><label>Carga anual (horas)</label><input class="form-control" data-parameter-name="carga_horaria_anual_horas" type="number"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Tipo de avaliação</label><input class="form-control" data-parameter-name="tipo_avaliacao" type="text"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Regra de avaliação</label><input class="form-control" data-parameter-name="regra_avaliacao" type="text"></div></div>
                        <div class="col-md-4 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-usa-recuperacao" data-parameter-name="usa_recuperacao_paralela" type="checkbox"><label class="custom-control-label" for="param-usa-recuperacao">Usa recuperação paralela</label></div></div>
                        <div class="col-md-4 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-conselho-classe" data-parameter-name="conselho_classe_obrigatorio" type="checkbox"><label class="custom-control-label" for="param-conselho-classe">Conselho de classe obrigatório</label></div></div>
                    </div>
                    <div class="section-actions"><button class="btn btn-primary" data-save-section>Salvar regras acadêmicas</button></div>
                </div>

                <div class="institutional-section-card">
                    <div class="institutional-form-section-title">Etapas e organização</div>
                    <div class="row">
                        <div class="col-md-3"><div class="form-group"><label>Idade corte infantil</label><input class="form-control" data-parameter-name="idade_corte_infantil" type="number"></div></div>
                        <div class="col-md-3"><div class="form-group"><label>Idade corte fundamental</label><input class="form-control" data-parameter-name="idade_corte_fundamental" type="number"></div></div>
                        <div class="col-md-3"><div class="form-group"><label>Tamanho padrão da turma</label><input class="form-control" data-parameter-name="tamanho_padrao_turma" type="number"></div></div>
                        <div class="col-md-3"><div class="form-group"><label>Turno padrão</label><input class="form-control" data-parameter-name="turno_padrao" type="text"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Máx. estudantes público EE</label><input class="form-control" data-parameter-name="max_estudantes_publico_ee_por_turma" type="number"></div></div>
                        <div class="col-md-4 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-multisseriada" data-parameter-name="permite_multisseriada" type="checkbox"><label class="custom-control-label" for="param-multisseriada">Permite classes multisseriadas</label></div></div>
                    </div>
                    <div class="section-actions"><button class="btn btn-primary" data-save-section>Salvar organização</button></div>
                </div>

                <div class="institutional-section-card">
                    <div class="institutional-form-section-title">Matrícula e transferência</div>
                    <div class="row">
                        <div class="col-md-3 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-rematricula" data-parameter-name="rematricula_automatica" type="checkbox"><label class="custom-control-label" for="param-rematricula">Rematrícula automática</label></div></div>
                        <div class="col-md-3 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-docs-matricula" data-parameter-name="exige_documentacao_completa_matricula" type="checkbox"><label class="custom-control-label" for="param-docs-matricula">Exigir documentação completa</label></div></div>
                        <div class="col-md-3 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-transf-pendencia" data-parameter-name="permite_transferencia_com_pendencia" type="checkbox"><label class="custom-control-label" for="param-transf-pendencia">Permitir transferência com pendência</label></div></div>
                        <div class="col-md-3 d-flex align-items-end"><div class="custom-control custom-switch mb-3"><input class="custom-control-input" id="param-validacao-interna" data-parameter-name="exige_validacao_transferencia_interna" type="checkbox"><label class="custom-control-label" for="param-validacao-interna">Exigir validação de transferência interna</label></div></div>
                    </div>
                    <div class="section-actions"><button class="btn btn-primary" data-save-section>Salvar regras de matrícula</button></div>
                </div>

                <div class="institutional-section-card">
                    <div class="institutional-form-section-title">Transporte e alertas</div>
                    <div class="row">
                        <div class="col-md-4"><div class="form-group"><label>Distância mínima para transporte (km)</label><input class="form-control" data-parameter-name="distancia_minima_transporte_km" type="number" step="0.01"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Limite de faltas para alerta</label><input class="form-control" data-parameter-name="limite_faltas_alerta" type="number"></div></div>
                    </div>
                    <div class="section-actions"><button class="btn btn-primary" data-save-section>Salvar transporte e alertas</button></div>
                </div>

                <div class="institutional-section-card">
                    <div class="institutional-form-section-title">Limites por etapa</div>
                    <div class="row">
                        <div class="col-md-4"><div class="form-group"><label>Tamanho máximo turma infantil</label><input class="form-control" data-parameter-name="tamanho_maximo_turma_infantil" type="number"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Tamanho máximo turma fundamental</label><input class="form-control" data-parameter-name="tamanho_maximo_turma_fundamental" type="number"></div></div>
                        <div class="col-md-4"><div class="form-group"><label>Tamanho máximo turma médio</label><input class="form-control" data-parameter-name="tamanho_maximo_turma_medio" type="number"></div></div>
                    </div>
                    <div class="section-actions"><button class="btn btn-primary" data-save-section>Salvar limites por etapa</button></div>
                </div>

                <div class="institutional-section-card">
                    <div class="institutional-form-section-title">Observações da rede</div>
                    <div class="row">
                        <div class="col-12"><div class="form-group"><label>Diretrizes e observações gerais</label><textarea class="form-control" data-parameter-name="observacoes_rede" rows="5"></textarea></div></div>
                        <div class="col-12"><div class="form-group"><label>Observações normativas</label><textarea class="form-control" data-parameter-name="observacoes_normativas" rows="5"></textarea></div></div>
                    </div>
                    <div class="section-actions"><button class="btn btn-primary" data-save-section>Salvar observações</button></div>
                </div>
            </div>
        </main>
    </div>
    <script src="../../js/jquery.min.js"></script><script src="../../js/popper.min.js"></script><script src="../../js/bootstrap.min.js"></script><script src="../../js/simplebar.min.js"></script><script src="../../js/jquery.stickOnScroll.js"></script><script src="../../js/tinycolor-min.js"></script><script src="../../js/config.js"></script><script src="../../js/apps.js"></script><script src="../../js/escola-contexto.js"></script><script src="../../js/sidebar-escola.js"></script><script src="../../js/sidebar-permissoes.js"></script><script src="../../js/institucional-module.js"></script>
</body>
</html>
